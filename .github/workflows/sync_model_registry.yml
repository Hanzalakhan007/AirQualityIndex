name: Sync Model Registry

on:
  workflow_dispatch:

jobs:
  sync-model-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Upload committed model artifacts to MongoDB Registry
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
          MONGO_MODEL_REGISTRY_COLLECTION: ${{ secrets.MONGO_MODEL_REGISTRY_COLLECTION }}
          MONGO_MODEL_BUCKET: ${{ secrets.MONGO_MODEL_BUCKET }}
        run: python scripts/sync_local_models_to_registry.py
